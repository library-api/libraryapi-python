name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "Tag $TAG does not match pyproject version $VER" >&2
            exit 1
          fi
      - run: python -m build
      - run: twine check dist/*
      - name: Run live tests against api.libraryapi.dev
        env:
          LIBRARYAPI_TEST_KEY: ${{ secrets.LIBRARYAPI_TEST_KEY }}
        run: |
          pip install -e . pytest
          pytest -v tests/
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
